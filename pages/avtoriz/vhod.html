<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="/css/avt.css">
</head>
<body>
    <div class="avt-wrp">
        <div class="title-avt">
            <img src="/img/icons/icon.png" alt="Логотип" class="img-logo">
            <h1 class="title-reg">Очумелые ручки</h1>
        </div>
        <div class="form-wrp">
            <div class="form-avt-wrp">
                <form class="avtoriz">
                    <h1 class="text-avt">Вход в аккаунт</h1>
                    <label class="name-input">Логин</label>
                    <input type="text" placeholder="Введите логин" class="input-avt" id="loginInput">
                    
                    <label class="name-input">Пароль</label>
                    <input type="password" placeholder="Введите пароль" class="input-avt" id="passInput">
                    
                    <button type="button" onclick="checkAndRedirect()" class="button">Войти</button>
                    
                    <div class="avt">
                        <p class="nn">Еще не зарегистрированы?</p>
                        <a class="ssylka" href="/pages/avtoriz/registr.html">Регистрация</a>         
                    </div>                    
                </form>
            </div>
        </div>
    </div>

    <script>
        function checkAndRedirect() {
            const login = document.getElementById('loginInput').value.trim();
            const password = document.getElementById('passInput').value.trim();

            console.log('Введено:', login, password);

            if (login === 'Admin' && password === 'KorokNET') {
                window.location.href = "./index.admin.html";
            } else if (login && password) {
                window.location.href = './index.prosm.html';
            } else {
                alert('Заполните все поля!');
            }
        }
    </script>
</body>
</html>
