<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/css.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="shortcut icon" href="/img/icons/favicon.ico" type="image/x-icon">
  <script type="module" src="/ts/admin.ts"></script>
  <title>Админка</title>
</head>
<body>
  <div class="admin-wrap">
    <section id="admin-auth" class="admin-auth">
      <div class="admin-auth-card">
        <h1 class="admin-title">Вход в админку</h1>
        <p class="admin-auth-text">Введите логин и пароль, чтобы открыть панель администратора.</p>

        <form id="admin-login-form" class="admin-auth-form">
          <label class="admin-auth-label" for="admin-login">Логин</label>
          <input id="admin-login" name="username" class="admin-auth-input" type="text" autocomplete="username">

          <label class="admin-auth-label" for="admin-password">Пароль</label>
          <input id="admin-password" name="password" class="admin-auth-input" type="password" autocomplete="current-password">

          <button class="admin-auth-button" type="submit">Войти</button>
        </form>

        <div id="admin-auth-status" class="admin-auth-status"></div>
      </div>
    </section>

    <section id="admin-panel" class="admin-panel" hidden>
      <div class="admin-header">
        <h1 class="admin-title">Заявки</h1>
        <div id="status" class="admin-status">Загрузка...</div>
      </div>

      <table class="admin-table" aria-describedby="status">
        <thead>
          <tr>
            <th>ID</th>
            <th>Создано</th>
            <th>ФИО</th>
            <th>Почта</th>
            <th>Адрес</th>
            <th>Описание</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody id="requests-body"></tbody>
      </table>

      <div id="empty" class="empty-state" hidden>Заявок пока нет.</div>
    </section>
  </div>
</body>
</html>
